version: "3.9"

services:
  rag-chatbot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rag-chatbot
    ports:
      - "8501:8501"
    volumes:
      - chroma_data:/app/data/chroma_db
      - uploads:/app/data/uploads
      - logs:/app/logs
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - UPLOAD_DIR=/app/data/uploads
      - LOG_DIR=/app/logs
      - TOKENIZERS_PARALLELISM=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  chroma_data:
    driver: local
  uploads:
    driver: local
  logs:
    driver: local
